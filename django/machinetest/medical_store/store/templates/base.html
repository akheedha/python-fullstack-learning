<!DOCTYPE html>
<html>
<head>
    <title>Medical Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f8f9fa;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .navbar {
            background: #ff6b81;
        }
        .navbar-brand, .nav-link {
            color: white !important;
        }
        .btn-primary {
            background: #ff6b81;
            border: none;
        }
        .btn-primary:hover {
            background: #ff4757;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="/">💊 Medical Store</a>

        <div>
            {% if user.is_authenticated %}
                <a class="nav-link d-inline" href="/add/">Add</a>
                <a class="nav-link d-inline" href="/logout/">Logout</a>
            {% else %}
                <a class="nav-link d-inline" href="/login/">Login</a>
                <a class="nav-link d-inline" href="/signup/">Signup</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
